<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alur Proses Kaskade TBC + Investigasi Kontak — Kota Bandung</title>
<style>
  :root{--navy:#0F2E4E;--mut:#6b7280;--line:#e5e7eb;--blue:#2A78D6;--violet:#5f3fbf;--orange:#e07b2e;--red:#c0392b}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#1f2937;background:#f7f8fa}
  header{background:#0F2E4E;color:#fff;padding:16px 22px}
  header h1{margin:0;font-size:1.15rem} header p{margin:4px 0 0;font-size:.82rem;opacity:.85}
  header a{color:#bfe0ff;font-size:.8rem}
  .wrap{max-width:1000px;margin:18px auto;padding:0 16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:.76rem;color:var(--mut);margin:0 0 10px}
  .legend i{display:inline-block;width:13px;height:13px;border-radius:3px;margin-right:5px;vertical-align:-2px}
  svg{width:100%;height:auto;display:block}
  .n-lab{font-weight:700;fill:var(--navy)}
  .n-val{font-weight:800}
  .n-sub{fill:#9aa0a8;font-size:10px}
  .e-lab{fill:var(--mut);font-size:11px}
  .note{font-size:.72rem;color:var(--mut);line-height:1.5;margin-top:12px}
</style>
</head>
<body>
<header>
  <h1>Alur Proses Kaskade TBC & Investigasi Kontak</h1>
  <p>Kota Bandung · SITB 2021–2026 (semua tahun) · domisili pasien Kota Bandung ·
     <a href="cascade_spatial.html">← dashboard spasio-temporal</a></p>
</header>
<div class="wrap">
  <div class="card">
    <div class="legend">
      <span><i style="background:#eaf2fb;border:1.5px solid var(--blue)"></i>Kaskade pasien (tb06 → tb03)</span>
      <span><i style="background:#efeafb;border:1.5px solid var(--violet)"></i>Investigasi Kontak (tb16rk/sitk)</span>
      <span><i style="background:#fff3e8;border:1.5px solid var(--orange)"></i>Kontak sakit TBC (kasus baru)</span>
      <span><i style="background:none;border:1.5px dashed var(--red)"></i>Loop → terduga baru</span>
    </div>
    <svg id="flow" viewBox="0 0 760 880" role="img" aria-label="Diagram alur proses kaskade TBC dan investigasi kontak"></svg>
    <div class="note" id="note"></div>
  </div>
</div>
<script>
const fmt=n=>n==null?'–':(+n).toLocaleString('id-ID');
// ---- definisi node (koordinat statis) ----
const W=200,H=62;
const N={
  terduga:  {cx:180, y:30,  lab:'Terduga TBC',        sub:'tb06',        grp:'main'},
  diagnosis:{cx:180, y:136, lab:'Terdiagnosis TBC',   sub:'kasus indeks · tb06', grp:'main'},
  mulai:    {cx:180, y:242, lab:'Mulai pengobatan',   sub:'tb03',        grp:'main'},
  berhasil: {cx:180, y:348, lab:'Sembuh',             sub:'Sembuh + Peng. lengkap · tb03', grp:'main'},
  ik:       {cx:480, y:136, lab:'Investigasi Kontak', sub:'kasus indeks ber-IK', grp:'ik', hdr:true},
  kontak:   {cx:480, y:242, lab:'Total kontak',       sub:'serumah + erat', grp:'ik'},
  invest:   {cx:480, y:348, lab:'Diinvestigasi',      sub:'dikunjungi/diperiksa', grp:'ik'},
  periksa:  {cx:480, y:454, lab:'Diperiksa',          sub:'skrining kontak', grp:'ik'},
  sakit:    {cx:330, y:560, lab:'Sakit TBC',          sub:'kontak jadi kasus', grp:'sick'},
  eligible: {cx:620, y:560, lab:'Eligible TPT',       sub:'memenuhi syarat', grp:'ik'},
  penerima: {cx:620, y:666, lab:'Penerima TPT',       sub:'mulai profilaksis', grp:'ik'},
  selesai:  {cx:620, y:772, lab:'Selesai TPT',        sub:'tuntas profilaksis', grp:'ik'},
};
for(const k in N){const n=N[k]; n.w=W; n.h=H; n.x=n.cx-W/2; n.cy=n.y+H/2;}
const STYLE={main:{fill:'#eaf2fb',stroke:'#2A78D6',val:'#184f95'},
             ik:{fill:'#efeafb',stroke:'#5f3fbf',val:'#472f96'},
             sick:{fill:'#fff3e8',stroke:'#e07b2e',val:'#c0392b'}};
// ---- edges: [dari, ke, jenis, label?] ----
const E=[
  ['terduga','diagnosis','v'],
  ['diagnosis','mulai','v'],
  ['mulai','berhasil','v'],
  ['diagnosis','ik','h','memicu IK'],
  ['ik','kontak','v'],
  ['kontak','invest','v'],
  ['invest','periksa','v'],
  ['periksa','sakit','branch'],
  ['periksa','eligible','branch'],
  ['eligible','penerima','v'],
  ['penerima','selesai','v'],
  ['sakit','terduga','loop','kontak sakit → kasus baru'],
];
function edgePath(a,b,type){
  if(type==='h'){ const x1=a.cx+a.w/2,y1=a.cy,x2=b.cx-b.w/2,y2=b.cy; return {d:`M${x1},${y1} L${x2},${y2}`,lx:(x1+x2)/2,ly:y1-8}; }
  if(type==='loop'){ const x1=a.x, y1=a.cy, x2=b.x, y2=b.cy, cx=46;   // siku: kiri → atas → kanan (10px lebih kiri)
    return {d:`M${x1},${y1} H${cx} V${y2} H${x2}`, lx:cx-9, ly:(y1+y2)/2, loop:true}; }
  if(type==='branch'){ const x1=a.cx,y1=a.y+a.h,x2=b.cx,y2=b.y,midY=y1+(y2-y1)/2;   // turun → siku kiri/kanan → bawah
    return {d:`M${x1},${y1} V${midY} H${x2} V${y2}`, lx:(x1+x2)/2, ly:midY-6}; }
  // v: bawah-tengah a → atas-tengah b
  const x1=a.cx,y1=a.y+a.h,x2=b.cx,y2=b.y; return {d:`M${x1},${y1} L${x2},${y2}`,lx:(x1+x2)/2,ly:(y1+y2)/2};
}
function draw(vals){
  const parts=[`<defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6470"/></marker>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/></marker>
  </defs>`];
  // edges dulu (di bawah node)
  for(const [a,b,t,lab] of E){
    const p=edgePath(N[a],N[b],t), loop=t==='loop';
    parts.push(`<path d="${p.d}" fill="none" stroke="${loop?'#c0392b':'#5b6470'}" stroke-width="${loop?2.2:1.6}" ${loop?'stroke-dasharray="7 5"':''} marker-end="url(#${loop?'arrLoop':'arr'})"/>`);
    if(lab) parts.push(`<text class="e-lab" x="${p.lx}" y="${p.ly}" text-anchor="middle" ${loop?`fill="#c0392b" font-weight="700" transform="rotate(-90 ${p.lx} ${p.ly})"`:''}>${lab}</text>`);
  }
  // node
  for(const k in N){const n=N[k], s=STYLE[n.grp], v=vals[k];
    parts.push(`<g>
      <rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="11" fill="${s.fill}" stroke="${s.stroke}" stroke-width="${n.hdr?2.4:1.6}"/>
      <text class="n-lab" x="${n.cx}" y="${n.y+22}" text-anchor="middle" font-size="13">${n.lab}</text>
      <text class="n-val" x="${n.cx}" y="${n.y+43}" text-anchor="middle" font-size="17" fill="${s.val}">${v==null?'':fmt(v)}</text>
      <text class="n-sub" x="${n.cx}" y="${n.y+55}" text-anchor="middle">${n.sub}</text>
    </g>`);
  }
  document.getElementById('flow').innerHTML=parts.join('');
}
// ---- ambil angka kota/semua dari agregat yang sudah ada ----
fetch('data/cascade_spatial.json').then(r=>r.json()).then(d=>{
  const pr=d.proses.kota.semua, T=pr.tahap, ik=pr.ik.tahap;
  const g=arr=>Object.fromEntries(arr.map(t=>[t.nama,t.n]));
  const m=g(T), i=g(ik);
  draw({terduga:m['Terduga'], diagnosis:m['Terdiagnosis TBC'], mulai:m['Mulai pengobatan'], berhasil:m['Berhasil'],
        ik:pr.ik.n_indeks, kontak:i['Total kontak'], invest:i['Diinvestigasi'], periksa:i['Diperiksa'],
        sakit:i['Sakit TBC'], eligible:i['Eligible TPT'], penerima:i['Penerima TPT'], selesai:i['Selesai TPT']});
  document.getElementById('note').innerHTML=
    `Angka = agregat Kota Bandung, semua tahun (2021–2026). Kaskade utama tersambung ke Investigasi Kontak di node <b>kasus indeks</b> (pasien terdiagnosis). `+
    `Kontak yang <b>Sakit TBC</b> menjadi kasus baru dan kembali ke <b>Terduga</b> (panah putus merah = loop). `+
    `IK di-join via nomor register (cakupan ~88% pasien). Persentase konversi antar-tahap tak selalu monoton (pelaporan SITB); tanpa lag waktu (tak ada tanggal IK). Sumber: tb16rk + tambalan sitk kader.`;
}).catch(e=>{ draw({}); document.getElementById('note').textContent='Gagal memuat data/cascade_spatial.json — jalankan analytics/agg_cascade_spatial.py lalu buka lewat server (npm start).'; });
</script>
</body>
</html>
